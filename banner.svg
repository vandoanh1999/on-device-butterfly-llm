<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

      .bg { fill: #0d1117; }
      .grid-line { stroke: #21262d; stroke-width: 0.5; }
      .node { fill: #58a6ff; }
      .node-core { fill: #1f6feb; }
      .edge { stroke-width: 1.2; fill: none; opacity: 0.6; }
      .edge-b { stroke: #58a6ff; }
      .edge-g { stroke: #3fb950; }
      .edge-p { stroke: #bc8cff; }
      .edge-o { stroke: #f78166; }
      .label { font-family: 'JetBrains Mono', monospace; fill: #8b949e; font-size: 9px; }
      .title { font-family: 'JetBrains Mono', monospace; fill: #f0f6fc; font-size: 18px; font-weight: 700; }
      .subtitle { font-family: 'JetBrains Mono', monospace; fill: #58a6ff; font-size: 10px; }
      .badge { font-family: 'JetBrains Mono', monospace; font-size: 8px; font-weight: 700; }
      .stat-val { font-family: 'JetBrains Mono', monospace; fill: #3fb950; font-size: 13px; font-weight: 700; }
      .stat-lbl { font-family: 'JetBrains Mono', monospace; fill: #8b949e; font-size: 8px; }
      .glow { filter: url(#glow); }

      /* Butterfly edge animations */
      .e1 { animation: dash1 3s linear infinite; stroke-dasharray: 6 3; }
      .e2 { animation: dash2 3s linear infinite; stroke-dasharray: 6 3; }
      .e3 { animation: dash3 2.5s linear infinite; stroke-dasharray: 6 3; }
      .e4 { animation: dash4 2.5s linear infinite; stroke-dasharray: 6 3; }

      @keyframes dash1 { to { stroke-dashoffset: -36; } }
      @keyframes dash2 { to { stroke-dashoffset: -36; } }
      @keyframes dash3 { to { stroke-dashoffset: -36; } }
      @keyframes dash4 { to { stroke-dashoffset: -36; } }

      /* Node pulse */
      .pulse { animation: pulse 2s ease-in-out infinite alternate; }
      .pulse2 { animation: pulse 2s ease-in-out infinite alternate; animation-delay: 0.5s; }
      .pulse3 { animation: pulse 2s ease-in-out infinite alternate; animation-delay: 1s; }
      .pulse4 { animation: pulse 2s ease-in-out infinite alternate; animation-delay: 1.5s; }
      @keyframes pulse {
        from { opacity: 0.5; r: 4; }
        to   { opacity: 1.0; r: 6; }
      }

      /* Scan line */
      .scan { animation: scan 4s linear infinite; }
      @keyframes scan {
        0%   { transform: translateX(-20px); opacity: 0; }
        10%  { opacity: 0.15; }
        90%  { opacity: 0.15; }
        100% { transform: translateX(520px); opacity: 0; }
      }

      /* Stats fade in */
      .fadein1 { animation: fadein 0.8s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
      .fadein2 { animation: fadein 0.8s ease-out forwards; animation-delay: 0.5s; opacity: 0; }
      .fadein3 { animation: fadein 0.8s ease-out forwards; animation-delay: 0.8s; opacity: 0; }
      .fadein4 { animation: fadein 0.8s ease-out forwards; animation-delay: 1.1s; opacity: 0; }
      @keyframes fadein { to { opacity: 1; } }

      /* Title shimmer */
      .shimmer { animation: shimmer 3s ease-in-out infinite alternate; }
      @keyframes shimmer {
        from { fill: #f0f6fc; }
        to   { fill: #79c0ff; }
      }

      /* Blink cursor */
      .cursor { animation: blink 1s step-end infinite; }
      @keyframes blink { 50% { opacity: 0; } }
    </style>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#238636;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect class="bg" width="900" height="280"/>

  <!-- Subtle grid -->
  <g opacity="0.3">
    <line class="grid-line" x1="0" y1="40" x2="900" y2="40"/>
    <line class="grid-line" x1="0" y1="80" x2="900" y2="80"/>
    <line class="grid-line" x1="0" y1="120" x2="900" y2="120"/>
    <line class="grid-line" x1="0" y1="160" x2="900" y2="160"/>
    <line class="grid-line" x1="0" y1="200" x2="900" y2="200"/>
    <line class="grid-line" x1="0" y1="240" x2="900" y2="240"/>
    <line class="grid-line" x1="80" y1="0" x2="80" y2="280"/>
    <line class="grid-line" x1="500" y1="0" x2="500" y2="280"/>
  </g>

  <!-- === BUTTERFLY NETWORK (left side) === -->
  <!-- Layer labels -->
  <text class="label" x="38" y="22">L0</text>
  <text class="label" x="118" y="22">L1</text>
  <text class="label" x="198" y="22">L2</text>
  <text class="label" x="278" y="22">L3</text>
  <text class="label" x="355" y="22">OUT</text>

  <!-- Stage 0 nodes -->
  <circle class="node pulse"  cx="45" cy="60"  r="5" filter="url(#glow)"/>
  <circle class="node pulse2" cx="45" cy="100" r="5" filter="url(#glow)"/>
  <circle class="node pulse3" cx="45" cy="140" r="5" filter="url(#glow)"/>
  <circle class="node pulse4" cx="45" cy="180" r="5" filter="url(#glow)"/>
  <circle class="node pulse"  cx="45" cy="220" r="5" filter="url(#glow)"/>
  <circle class="node pulse2" cx="45" cy="260" r="5" filter="url(#glow)"/>

  <!-- Stage 1 nodes -->
  <circle class="node-core pulse2" cx="125" cy="60"  r="5" filter="url(#glow)"/>
  <circle class="node-core pulse3" cx="125" cy="100" r="5" filter="url(#glow)"/>
  <circle class="node-core pulse4" cx="125" cy="140" r="5" filter="url(#glow)"/>
  <circle class="node-core pulse"  cx="125" cy="180" r="5" filter="url(#glow)"/>
  <circle class="node-core pulse2" cx="125" cy="220" r="5" filter="url(#glow)"/>
  <circle class="node-core pulse3" cx="125" cy="260" r="5" filter="url(#glow)"/>

  <!-- Stage 2 nodes -->
  <circle class="node pulse3" cx="205" cy="60"  r="5" filter="url(#glow)"/>
  <circle class="node pulse4" cx="205" cy="100" r="5" filter="url(#glow)"/>
  <circle class="node pulse"  cx="205" cy="140" r="5" filter="url(#glow)"/>
  <circle class="node pulse2" cx="205" cy="180" r="5" filter="url(#glow)"/>
  <circle class="node pulse3" cx="205" cy="220" r="5" filter="url(#glow)"/>
  <circle class="node pulse4" cx="205" cy="260" r="5" filter="url(#glow)"/>

  <!-- Stage 3 nodes -->
  <circle class="node-core pulse" cx="285" cy="60"  r="5" filter="url(#glow)"/>
  <circle class="node-core pulse2" cx="285" cy="100" r="5" filter="url(#glow)"/>
  <circle class="node-core pulse3" cx="285" cy="140" r="5" filter="url(#glow)"/>
  <circle class="node-core pulse4" cx="285" cy="180" r="5" filter="url(#glow)"/>
  <circle class="node-core pulse" cx="285" cy="220" r="5" filter="url(#glow)"/>
  <circle class="node-core pulse2" cx="285" cy="260" r="5" filter="url(#glow)"/>

  <!-- Output nodes -->
  <circle cx="365" cy="60"  r="6" fill="url(#grad-blue)" filter="url(#glow-strong)"/>
  <circle cx="365" cy="100" r="6" fill="url(#grad-blue)" filter="url(#glow-strong)"/>
  <circle cx="365" cy="140" r="6" fill="url(#grad-blue)" filter="url(#glow-strong)"/>
  <circle cx="365" cy="180" r="6" fill="url(#grad-blue)" filter="url(#glow-strong)"/>
  <circle cx="365" cy="220" r="6" fill="url(#grad-blue)" filter="url(#glow-strong)"/>
  <circle cx="365" cy="260" r="6" fill="url(#grad-blue)" filter="url(#glow-strong)"/>

  <!-- Butterfly edges L0→L1 (stride 1) -->
  <line class="edge edge-b e1" x1="50" y1="60"  x2="120" y2="60"/>
  <line class="edge edge-p e2" x1="50" y1="60"  x2="120" y2="100"/>
  <line class="edge edge-p e2" x1="50" y1="100" x2="120" y2="60"/>
  <line class="edge edge-b e1" x1="50" y1="100" x2="120" y2="100"/>
  <line class="edge edge-b e1" x1="50" y1="140" x2="120" y2="140"/>
  <line class="edge edge-p e2" x1="50" y1="140" x2="120" y2="180"/>
  <line class="edge edge-p e2" x1="50" y1="180" x2="120" y2="140"/>
  <line class="edge edge-b e1" x1="50" y1="180" x2="120" y2="180"/>
  <line class="edge edge-b e1" x1="50" y1="220" x2="120" y2="220"/>
  <line class="edge edge-p e2" x1="50" y1="220" x2="120" y2="260"/>
  <line class="edge edge-p e2" x1="50" y1="260" x2="120" y2="220"/>
  <line class="edge edge-b e1" x1="50" y1="260" x2="120" y2="260"/>

  <!-- Butterfly edges L1→L2 (stride 2) -->
  <line class="edge edge-g e3" x1="130" y1="60"  x2="200" y2="60"/>
  <line class="edge edge-o e4" x1="130" y1="60"  x2="200" y2="140"/>
  <line class="edge edge-o e4" x1="130" y1="140" x2="200" y2="60"/>
  <line class="edge edge-g e3" x1="130" y1="140" x2="200" y2="140"/>
  <line class="edge edge-g e3" x1="130" y1="100" x2="200" y2="100"/>
  <line class="edge edge-o e4" x1="130" y1="100" x2="200" y2="180"/>
  <line class="edge edge-o e4" x1="130" y1="180" x2="200" y2="100"/>
  <line class="edge edge-g e3" x1="130" y1="180" x2="200" y2="180"/>
  <line class="edge edge-g e3" x1="130" y1="220" x2="200" y2="220"/>
  <line class="edge edge-o e4" x1="130" y1="220" x2="200" y2="260"/>  <!-- DIB diagonal -->
  <line class="edge edge-o e4" x1="130" y1="260" x2="200" y2="220"/>
  <line class="edge edge-g e3" x1="130" y1="260" x2="200" y2="260"/>

  <!-- Butterfly edges L2→L3 (stride 4) -->
  <line class="edge edge-b e1" x1="210" y1="60"  x2="280" y2="60"/>
  <line class="edge edge-p e2" x1="210" y1="60"  x2="280" y2="180"/>
  <line class="edge edge-p e2" x1="210" y1="180" x2="280" y2="60"/>
  <line class="edge edge-b e1" x1="210" y1="180" x2="280" y2="180"/>
  <line class="edge edge-b e1" x1="210" y1="100" x2="280" y2="100"/>
  <line class="edge edge-p e2" x1="210" y1="100" x2="280" y2="220"/>
  <line class="edge edge-p e2" x1="210" y1="220" x2="280" y2="100"/>
  <line class="edge edge-b e1" x1="210" y1="220" x2="280" y2="220"/>
  <line class="edge edge-b e1" x1="210" y1="140" x2="280" y2="140"/>
  <line class="edge edge-p e2" x1="210" y1="140" x2="280" y2="260"/>
  <line class="edge edge-p e2" x1="210" y1="260" x2="280" y2="140"/>
  <line class="edge edge-b e1" x1="210" y1="260" x2="280" y2="260"/>

  <!-- L3→OUT -->
  <line class="edge edge-g e3" x1="290" y1="60"  x2="359" y2="60"/>
  <line class="edge edge-g e3" x1="290" y1="100" x2="359" y2="100"/>
  <line class="edge edge-g e3" x1="290" y1="140" x2="359" y2="140"/>
  <line class="edge edge-g e3" x1="290" y1="180" x2="359" y2="180"/>
  <line class="edge edge-g e3" x1="290" y1="220" x2="359" y2="220"/>
  <line class="edge edge-g e3" x1="290" y1="260" x2="359" y2="260"/>

  <!-- Scan line effect -->
  <rect class="scan" x="0" y="0" width="30" height="280" fill="url(#grad-blue)"/>

  <!-- === RIGHT SIDE: Title + Stats === -->
  <!-- Divider -->
  <line x1="500" y1="20" x2="500" y2="260" stroke="#30363d" stroke-width="1"/>

  <!-- Title block -->
  <text class="title shimmer" x="525" y="55">VDAE ENGINE</text>
  <text class="subtitle" x="525" y="72">On-Device Butterfly LLM Training · AArch64</text>

  <!-- Tag badges -->
  <rect x="525" y="82" width="68" height="14" rx="7" fill="#1f6feb" opacity="0.8"/>
  <text class="badge" fill="#cae8ff" x="531" y="92">DIB Attention</text>

  <rect x="600" y="82" width="62" height="14" rx="7" fill="#238636" opacity="0.8"/>
  <text class="badge" fill="#aff5b4" x="606" y="92">O(N log N)</text>

  <rect x="669" y="82" width="60" height="14" rx="7" fill="#6e40c9" opacity="0.8"/>
  <text class="badge" fill="#d2a8ff" x="675" y="92">Ternary Wt</text>

  <rect x="525" y="100" width="54" height="14" rx="7" fill="#b62324" opacity="0.8"/>
  <text class="badge" fill="#ffa198" x="531" y="110">Flash-LoRA</text>

  <rect x="586" y="100" width="74" height="14" rx="7" fill="#9e6a03" opacity="0.8"/>
  <text class="badge" fill="#ffd8b5" x="592" y="110">Pred. Coding</text>

  <rect x="667" y="100" width="56" height="14" rx="7" fill="#1b4b36" opacity="0.8"/>
  <text class="badge" fill="#aff5b4" x="673" y="110">No Cloud ✓</text>

  <!-- Stats grid -->
  <!-- Row 1 -->
  <g class="fadein1">
    <rect x="525" y="128" width="80" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text class="stat-val" x="537" y="150">5,263</text>
    <text class="stat-lbl" x="537" y="163">tok/s inference</text>
  </g>

  <g class="fadein2">
    <rect x="615" y="128" width="80" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text class="stat-val" x="622" y="150">315x</text>
    <text class="stat-lbl" x="622" y="163">memory reduction</text>
  </g>

  <g class="fadein3">
    <rect x="705" y="128" width="80" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text class="stat-val" x="712" y="150">53K</text>
    <text class="stat-lbl" x="712" y="163">sustained ops/s</text>
  </g>

  <!-- Row 2 -->
  <g class="fadein2">
    <rect x="525" y="182" width="80" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text class="stat-val" x="529" y="204">8.2/13</text>
    <text class="stat-lbl" x="529" y="217">arXiv score</text>
  </g>

  <g class="fadein3">
    <rect x="615" y="182" width="80" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text class="stat-val" x="622" y="204">697x</text>
    <text class="stat-lbl" x="622" y="217">energy vs cloud</text>
  </g>

  <g class="fadein4">
    <rect x="705" y="182" width="80" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text class="stat-val" x="712" y="204">0.000</text>
    <text class="stat-lbl" x="712" y="217">forgetting score</text>
  </g>

  <!-- Bottom: hardware + terminal line -->
  <rect x="525" y="236" width="260" height="28" rx="5" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text class="label" x="534" y="251" fill="#3fb950">▶</text>
  <text class="label" x="547" y="251" fill="#58a6ff">Snapdragon 7+ Gen 2</text>
  <text class="label" x="672" y="251" fill="#8b949e">· Termux · AArch64</text>
  <text class="label cursor" x="780" y="251" fill="#3fb950">█</text>

  <!-- Complexity annotation -->
  <text class="label" x="525" y="275" fill="#6e7681">W_DIB = B_{L-1}·D_{L-1}·B_{L-2}·...·D_0·B_0   |   O(N log N)   |   NEON SIMD ✓</text>

</svg>
